name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.6'
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN || '' }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 || '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@e0d9b652b137eb15314fff188f09e1ba18d3cc5b
      - name: Format
        run: make check-fmt
      - name: Cache whitaker installer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install the Whitaker Dylint suite
        run: |
          # `cargo binstall --version` exits non-zero (the flag requires a
          # value), so probe availability with `-V` instead.
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall -V >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          # whitaker-installer 0.2.6 probes binstall with the same broken
          # `--version` flag, so its dylint-link fallback compiles from
          # crates.io and needs rustc >= 1.91 — newer than this repository's
          # pinned nightly. Preinstall the prebuilt dylint-link that the
          # installer expects so it detects the tool and skips that path.
          if cargo binstall -V >/dev/null 2>&1; then
            cargo binstall --no-confirm dylint-link@6.0.1
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          enable-cache: true
      - name: Spelling
        run: make spelling
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Test
        run: make test
      - name: Generate coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@e0d9b652b137eb15314fff188f09e1ba18d3cc5b
        with:
          output-path: lcov.info
          format: lcov
          use-cargo-nextest: 'false'
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/70676
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ env.CODESCENE_CLI_SHA256 }}
